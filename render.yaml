services:
  - type: web
    name: barberflow-api
    runtime: node
    repo: https://github.com/Rafa3-5484/BarberFlowPro
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_DIRECT_URL
        sync: false
      - key: JWT_SECRET
        value: super-secret-jwt-key-barberflow-2024
      - key: JWT_EXPIRATION
        value: 15m
      - key: REFRESH_TOKEN_SECRET
        value: super-secret-refresh-key-barberflow-2024
      - key: REFRESH_TOKEN_EXPIRATION
        value: 7d
      - key: PORT
        value: "3001"
